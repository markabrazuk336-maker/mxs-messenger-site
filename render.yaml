services:
  - type: web
    name: mxs-messenger
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: FRONTEND_ORIGIN
        value: "*"
      - key: DATABASE_URL
        value: sqlite:///../data/mxs.db
