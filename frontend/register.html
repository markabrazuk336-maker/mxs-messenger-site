<!doctype html><html lang="ru"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Регистрация — MXS</title><link rel="stylesheet" href="css/style.css"/></head><body class="auth-page"><section class="auth-info"><div class="logo">MXS</div><h1>Создай аккаунт</h1><p>После регистрации тебя смогут найти по username или номеру телефона.</p></section><form class="auth-card" id="registerForm"><h2>Регистрация</h2><p class="muted">Пароль хранится только как bcrypt-хэш.</p><label>Username</label><input name="username" autocomplete="username" placeholder="markazuk" required minlength="3" maxlength="32"/><label>Email</label><input name="email" type="email" autocomplete="email" placeholder="you@gmail.com" required/><p class="hint">Email нужен для входа и восстановления аккаунта в будущем.</p><label>Телефон</label><input name="phone" autocomplete="tel" placeholder="+79999999999" required minlength="10" maxlength="24"/><p class="hint">Можно писать так: +79991234567, 89991234567 или 9991234567.</p><label>Имя</label><input name="display_name" placeholder="Марк" required minlength="2" maxlength="64"/><label>Пароль</label><input name="password" type="password" autocomplete="new-password" required minlength="8" maxlength="72"/><button class="btn" type="submit">Создать аккаунт</button><div class="error" id="errorBox"></div><p class="muted">Уже есть аккаунт? <a href="login.html">Войти</a></p></form><script src="js/app.js"></script><script src="js/auth.js?v=9"></script></body></html>
